spring:
  datasource:
    url: jdbc:h2:mem:aidlc-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      # Tests manage schema directly; Flyway is disabled to isolate migration concerns.
      # Schema drift vs production is an accepted risk — tightened per slice as migrations accumulate.
      ddl-auto: create-drop
  flyway:
    enabled: false
  ai:
    openai:
      api-key: test
      base-url: http://localhost:0
      chat:
        options:
          model: test-chat
      embedding:
        options:
          model: test-embedding
    vectorstore:
      azure:
        url: http://localhost:0
        api-key: test
        index-name: test-index
        initialize-schema: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  profile-mode: test
  security:
    jwt:
      issuer-uri: ""
