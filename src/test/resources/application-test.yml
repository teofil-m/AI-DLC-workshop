spring:
  datasource:
    url: jdbc:h2:mem:aidlc-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  ai:
    azure:
      openai:
        endpoint: http://localhost:0
        api-key: test
        chat:
          options:
            deployment-name: test-chat
        embedding:
          options:
            deployment-name: test-embedding

app:
  profile-mode: test
