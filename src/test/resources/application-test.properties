# Test profile — uses H2 in-memory; external services are disabled or stubbed

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Disable Azure Vector Store auto-configuration in tests
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.azure.autoconfigure.AzureVectorStoreAutoConfiguration
spring.ai.azure.openai.api-key=test-key
spring.ai.azure.openai.endpoint=http://localhost

# Actuator — expose health for security tests
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
