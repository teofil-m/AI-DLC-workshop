# Test profile — properties override YAML; keep all test-specific overrides here.

spring.datasource.url=jdbc:h2:mem:aidlc-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flyway must be disabled — Hibernate create-drop manages the schema in tests.
spring.flyway.enabled=false

# Hibernate creates schema from entities; never validate in tests.
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Azure Vector Store auto-configuration — no Azure credentials in CI.
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.azure.autoconfigure.AzureVectorStoreAutoConfiguration

# Stub Spring AI OpenAI config so auto-configuration completes without real credentials.
spring.ai.openai.api-key=test
spring.ai.openai.base-url=http://localhost:0
