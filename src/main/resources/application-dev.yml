spring:
  datasource:
    url: jdbc:h2:mem:aidlc;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    baseline-on-migrate: true
  ai:
    # Azure AI Foundry exposes an OpenAI-compatible endpoint — use spring.ai.openai.* with base-url override.
    openai:
      api-key: ${AZURE_OPENAI_API_KEY:}
      base-url: ${AZURE_OPENAI_ENDPOINT:}
      chat:
        options:
          model: ${AZURE_OPENAI_CHAT_DEPLOYMENT:CONFIGURE_ME}
      embedding:
        options:
          model: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:text-embedding-3-small}
    vectorstore:
      azure:
        url: ${AZURE_AI_SEARCH_ENDPOINT:}
        api-key: ${AZURE_AI_SEARCH_API_KEY:}
        index-name: ${AZURE_AI_SEARCH_INDEX:ai-dlc-dev}

app:
  profile-mode: dev
  security:
    jwt:
      issuer-uri: ${JWT_ISSUER_URI:}
