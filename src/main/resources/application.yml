spring:
  application:
    name: ai-dlc-workshop
  profiles:
    default: dev
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.ai_dlc.workshop: DEBUG
    org.springframework.ai: INFO

app:
  security:
    jwt:
      issuer-uri: ${JWT_ISSUER_URI:}
      audience: ${JWT_AUDIENCE:ai-dlc-workshop}
  ai:
    embedding:
      dimensions: 1536
      model-id: text-embedding-3-small
    rag:
      top-k: 4
      similarity-threshold: 0.7
