spring:
  application:
    name: ai-dlc-workshop
  profiles:
    default: dev
  main:
    # Explicit servlet stack — WebFlux is on the classpath for reactive streaming only.
    # Without this Spring Boot may auto-detect the wrong application type.
    web-application-type: servlet
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 3MB
  threads:
    virtual:
      enabled: true

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.ai_dlc.workshop: DEBUG
    org.springframework.ai: INFO

app:
  security:
    jwt:
      audience: ${JWT_AUDIENCE:ai-dlc-workshop}
      # issuer-uri is profile-specific: required in prod (no default), optional in dev/test
  ai:
    embedding:
      dimensions: 1536
      model-id: text-embedding-3-small
    rag:
      top-k: 4
      similarity-threshold: 0.7
